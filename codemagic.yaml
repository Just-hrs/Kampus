workflows:
  android-apk:
    name: Kampus APK
    max_build_duration: 60

    environment:
      node: 20

    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile

      - name: Build web app
        script: |
          pnpm build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
workflows:
  android-apk:
    name: Kampus APK
    max_build_duration: 60

    environment:
      node: 22
      java: 17

      groups:
        - google_play

    scripts:
      - name: Deep clean environment
        script: |
          rm -rf ~/.gradle
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf android/app/build

      - name: Install dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile

      - name: Build web app
        script: pnpm build

      - name: Sync Capacitor (safe mode)
        script: |
          npx cap sync android

      - name: Fix Gradle wrapper permissions
        script: |
          cd android
          chmod +x gradlew
          ./gradlew --version

      - name: Build APK (hard mode)
        script: |
          cd android
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug --stacktrace --no-daemon

    artifacts:
      - android/app/build/outputs/**/*.apk
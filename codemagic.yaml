workflows:
  android-apk:
    name: Kampus APK
    max_build_duration: 60

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile

      # 🔥 CLEAN FIRST (before anything touches Gradle)
      - name: Clean Gradle cache
        script: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper

      - name: Build web app
        script: |
          pnpm build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace --refresh-dependencies

    artifacts:
      - android/app/build/outputs/**/*.apk